<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alysa Salsabila — Project Showcase</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0C0B09;
      --surface:      rgba(255,255,255,0.04);
      --surface-hover:rgba(255,255,255,0.07);
      --border:       rgba(255,255,255,0.08);
      --border-hover: rgba(232,112,74,0.4);
      --text:         #EDE8DF;
      --text-muted:   #7A7468;
      --text-dim:     #3A3832;
      --accent:       #E8704A;
      --accent-2:     #D4A843;
      --accent-glow:  rgba(232,112,74,0.15);
      --accent-glow2: rgba(232,112,74,0.06);
      --amber-glow:   rgba(212,168,67,0.08);
      --radius:       14px;
      --ease:         cubic-bezier(0.16, 1, 0.3, 1);
      --ease-spring:  cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      font-family: 'DM Sans', system-ui, sans-serif;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Ambient ── */
    .ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      animation: drift 22s ease-in-out infinite alternate;
    }

    .blob-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(232,112,74,0.18), transparent 70%);
      top: -180px; left: -100px;
      animation-duration: 26s;
    }

    .blob-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(212,168,67,0.12), transparent 70%);
      top: 20%; right: -80px;
      animation-duration: 19s;
      animation-delay: -9s;
    }

    .blob-3 {
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(232,112,74,0.08), transparent 70%);
      bottom: 15%; left: 25%;
      animation-duration: 24s;
      animation-delay: -15s;
    }

    @keyframes drift {
      0%   { transform: translate(0, 0) scale(1); }
      33%  { transform: translate(30px, -25px) scale(1.04); }
      66%  { transform: translate(-15px, 40px) scale(0.97); }
      100% { transform: translate(25px, 15px) scale(1.02); }
    }

    /* ── Page ── */
    .page { position: relative; z-index: 2; }

    /* ── Hero ── */
    .hero {
      max-width: 1100px;
      margin: 0 auto;
      padding: 80px 32px 56px;
      position: relative;
    }

    .hero::after {
      content: '';
      position: absolute;
      bottom: 0; left: 32px; right: 32px;
      height: 1px;
      background: linear-gradient(90deg, var(--accent), rgba(212,168,67,0.4), transparent);
      opacity: 0.3;
    }

    .hero-label {
      font-family: 'Geist Mono', monospace;
      font-size: 0.68rem;
      color: var(--text-muted);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .hero-label::after {
      content: '';
      width: 40px; height: 1px;
      background: var(--accent);
      opacity: 0.5;
    }

    .hero h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.2rem, 7.5vw, 6.5rem);
      font-weight: 800;
      line-height: 0.93;
      letter-spacing: -2.5px;
      color: var(--text);
    }

    .hero h1 span {
      color: var(--accent);
      display: block;
    }

    /* ── Toolbar ── */
    .toolbar {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 32px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .search-wrap {
      flex: 1;
      min-width: 200px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0 14px;
      backdrop-filter: blur(8px);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-wrap:focus-within {
      border-color: rgba(232,112,74,0.45);
      box-shadow: 0 0 0 3px var(--accent-glow2);
    }

    .search-wrap svg { color: var(--text-muted); flex-shrink: 0; }

    .search-wrap input {
      flex: 1;
      padding: 12px 0;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 0.83rem;
      outline: none;
      font-family: 'DM Sans', sans-serif;
    }

    .search-wrap input::placeholder { color: var(--text-dim); }

    .filter-group { display: flex; gap: 6px; flex-wrap: wrap; }

    .filter-btn {
      padding: 10px 18px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text-muted);
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s var(--ease);
      font-family: 'DM Sans', sans-serif;
      white-space: nowrap;
      backdrop-filter: blur(8px);
    }

    .filter-btn:hover {
      border-color: rgba(232,112,74,0.3);
      color: var(--text);
    }

    .filter-btn.active {
      background: var(--accent-glow);
      border-color: rgba(232,112,74,0.5);
      color: var(--accent);
    }

    /* ── Count bar ── */
    .count-bar {
      max-width: 1100px;
      margin: 0 auto;
      padding: 14px 32px;
      font-size: 0.7rem;
      color: var(--text-muted);
      font-family: 'Geist Mono', monospace;
      border-bottom: 1px solid var(--border);
    }

    .count-bar strong { color: var(--accent); }

    /* ── Grid ── */
    .grid {
      max-width: 1100px;
      margin: 0 auto 80px;
      padding: 20px 32px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(295px, 1fr));
      gap: 12px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      text-decoration: none;
      color: inherit;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(10px);
      transition: border-color 0.22s var(--ease),
                  background 0.22s var(--ease),
                  transform 0.22s var(--ease),
                  box-shadow 0.22s var(--ease);
      opacity: 0;
      animation: fadeUp 0.45s var(--ease) forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* warm glow on hover */
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      background: radial-gradient(circle at 30% 0%, var(--accent-glow), transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    /* top accent line */
    .card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .card:hover {
      border-color: var(--border-hover);
      background: var(--surface-hover);
      transform: translateY(-4px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(232,112,74,0.1);
    }

    .card:hover::before { opacity: 1; }
    .card:hover::after  { opacity: 1; }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .card-icon-wrap {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      flex-shrink: 0;
      transition: color 0.18s, border-color 0.18s, transform 0.22s var(--ease-spring);
    }

    .card:hover .card-icon-wrap {
      color: var(--accent);
      border-color: rgba(232,112,74,0.3);
      transform: scale(1.08) rotate(-4deg);
    }

    .card-icon-wrap svg { width: 16px; height: 16px; }

    .card-num {
      font-family: 'Geist Mono', monospace;
      font-size: 0.62rem;
      color: var(--text-dim);
      font-weight: 500;
      transition: color 0.18s;
      padding-top: 2px;
    }

    .card:hover .card-num { color: var(--accent); }

    .card-title {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.2;
      letter-spacing: -0.1px;
    }

    .card-desc {
      font-size: 0.77rem;
      color: var(--text-muted);
      line-height: 1.65;
      flex: 1;
      font-weight: 400;
    }




    /* ── Tech stack badges ── */
    .tech-stack { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 2px; }
    .tech-badge {
      font-size: 0.55rem; font-weight: 600; padding: 2px 6px; border-radius: 4px;
      font-family: 'Geist Mono', monospace; letter-spacing: 0.04em; text-transform: uppercase;
    }
    .tech-html  { background: rgba(228,77,38,0.12);  color: #e44d26; border: 1px solid rgba(228,77,38,0.2); }
    .tech-css   { background: rgba(38,77,228,0.12);  color: #264de4; border: 1px solid rgba(38,77,228,0.2); }
    .tech-js    { background: rgba(247,223,30,0.12); color: #c9a800; border: 1px solid rgba(247,223,30,0.2); }
    .tech-react { background: rgba(97,218,251,0.12); color: #61dafb; border: 1px solid rgba(97,218,251,0.2); }
    .tech-tailwind { background: rgba(6,182,212,0.12); color: #06b6d4; border: 1px solid rgba(6,182,212,0.2); }
    .tech-vite  { background: rgba(189,52,254,0.12); color: #bd34fe; border: 1px solid rgba(189,52,254,0.2); }
    .tech-ext   { background: rgba(66,133,244,0.12); color: #4285f4; border: 1px solid rgba(66,133,244,0.2); }
    .tech-axios    { background: rgba(104,186,232,0.12); color: #5a9fd4; border: 1px solid rgba(104,186,232,0.2); }
    .tech-nodejs   { background: rgba(104,160,99,0.12);  color: #68a063; border: 1px solid rgba(104,160,99,0.2); }
    .tech-vue      { background: rgba(65,184,131,0.12); color: #41b883; border: 1px solid rgba(65,184,131,0.2); }
    .tech-fabricjs  { background: rgba(0,163,255,0.12); color: #00a3ff; border: 1px solid rgba(0,163,255,0.2); }
    .tech-framer   { background: rgba(0,85,255,0.12); color: #0055ff; border: 1px solid rgba(0,85,255,0.2); }
    .tech-commander{ background: rgba(150,150,150,0.12); color: #aaaaaa; border: 1px solid rgba(150,150,150,0.2); }

    /* ── Empty ── */
    .empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .empty svg { display: block; margin: 0 auto 12px; opacity: 0.2; width: 30px; height: 30px; }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .hero { padding: 56px 20px 40px; }
      .hero::after { left: 20px; right: 20px; }
      .toolbar {
        padding: 16px 20px;
        flex-direction: column;
        align-items: stretch;
        gap: 8px;
      }
      .search-wrap { min-width: unset; width: 100%; }
      .filter-group {
        width: 100%;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 5px;
      }
      .filter-btn {
        padding: 8px 4px;
        font-size: 0.7rem;
        text-align: center;
        white-space: normal;
      }
      .count-bar { padding-left: 20px; padding-right: 20px; }
      .grid { padding: 16px 20px 60px; gap: 10px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .blob, .card { animation: none; }
      .card { opacity: 1; transform: none; }
    }
  </style>
</head>
<body>

  <div class="ambient" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="page">

    <header class="hero">
      <p class="hero-label">Alysa Salsabila Irfan Putri</p>
      <h1>PROJECT <span>SHOWCASE</span></h1>
    </header>

    <div class="toolbar">
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Search projects…" oninput="filterCards()" autocomplete="off" />
      </div>
      <div class="filter-group" id="filterGroup"></div>
    </div>

    <div class="count-bar">
      <strong id="showCount">41</strong> projects
    </div>

    <main class="grid" id="grid"></main>

  </div>

    /* Groups: some stacks share one filter button */
    const STACK_GROUP = {
      html:'html', css:'html', js:'html',
      react:'react', vue:'vue',
      tailwind:null, vite:null, axios:null, // hide these — too generic
      nodejs:'nodejs', commander:'nodejs',

    function buildFilters() {
      const seen  = new Set()
      const order = []
      PROJECTS.forEach(p => (p.stack || []).forEach(s => {
        const group = STACK_GROUP[s]
        if (group && !seen.has(group)) { seen.add(group); order.push(group) }
      }))

      const fg = document.getElementById('filterGroup')
      fg.innerHTML = ''

      // All button
      const allBtn = document.createElement('button')
      allBtn.className = 'filter-btn active'
      allBtn.textContent = 'All'
      allBtn.onclick = () => setFilter('all', allBtn)
      fg.appendChild(allBtn)

      // One button per unique group
      const groupLabels = {
        html:'HTML/CSS/JS', react:'React', vue:'Vue',
        nodejs:'Node.js', fabricjs:'Fabric.js', ext:'Extension'
      }
      order.forEach(group => {
        const btn = document.createElement('button')
        btn.className = 'filter-btn'
        btn.textContent = groupLabels[group] || group
        btn.onclick = () => setFilter(group, btn)
        fg.appendChild(btn)
      })
    }

        </div>`;
        return;

        const card = document.createElement('a');
        card.className = 'card';
        card.href = p.repo;
        card.target = '_blank';
        card.rel = 'noopener noreferrer';
        card.style.animationDelay = `${Math.min(i * 30, 450)}ms`;

        const techBadges = (p.stack || []).map(t => {
          const labels = {html:'HTML',css:'CSS',js:'JS',react:'React',tailwind:'Tailwind',vite:'Vite',ext:'Extension',axios:'Axios',nodejs:'Node.js',commander:'Commander.js',fabricjs:'Fabric.js',vue:'Vue',framer:'Framer Motion'};
          return `<span class="tech-badge tech-${t}">${labels[t]||t}</span>`;
        }).join('');
        card.innerHTML = `
          <div class="card-top">
            <div class="card-icon-wrap">${p.icon}</div>
            <span class="card-num">${pad(i + 1)}</span>
          </div>
          <div class="card-title">${p.name}</div>
          <div class="card-desc">${p.desc}</div>
          <div class="tech-stack">${techBadges}</div>
        `;
        grid.appendChild(card);
      });
    }

    function setFilter(tier, btn) {
      activeFilter = tier;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filterCards();
    }

    function filterCards() {
      const q = document.getElementById('searchInput').value.toLowerCase().trim();
      const filtered = PROJECTS.filter(p => {
        const matchCat = activeFilter === 'all' || (p.stack || []).some(s => {
          const g = {html:'html',css:'html',js:'html',react:'react',vue:'vue',nodejs:'nodejs',commander:'nodejs',fabricjs:'fabricjs',ext:'ext'}[s]
          return g === activeFilter
        });
        const matchSearch = !q ||
          p.name.toLowerCase().includes(q) ||
          p.desc.toLowerCase().includes(q) ||
          p.tags.some(t => t.toLowerCase().includes(q));
        return matchCat && matchSearch;
      });
      buildGrid(filtered);
    }

    buildFilters();
    document.getElementById('showCount').textContent = PROJECTS.length;
    buildGrid(PROJECTS);
  </script>
</body>
</html>
