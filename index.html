<head>
  <meta charset="UTF-8" />

  <title>App Ideas Showcase — alysasalsaa</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0f1e;
      --surface:  #1e293b;
      --border:   #334155;
      --text:     #f8fafc;
      --muted:    #64748b;
      --accent:   #6366f1;
      --accent2:  #818cf8;
    }

    body {
      background: var(--bg);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Hero ── */
    .hero {
      background: linear-gradient(160deg, #0f172a 0%, #1e1b4b 50%, #0a0f1e 100%);
      padding: 64px 20px 48px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 70%);
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
    }

    .hero-badge {
      display: inline-block;
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.3);
      color: var(--accent2);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 5px 16px;
      border-radius: 999px;
      margin-bottom: 20px;
    }

    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1.1;
      margin-bottom: 14px;
    }

    .hero h1 span { color: var(--accent2); }

    .hero p {
      font-size: 1rem;
      color: var(--muted);
      max-width: 520px;
      margin: 0 auto 28px;
      line-height: 1.7;
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 32px;
      flex-wrap: wrap;
    }

    .hero-stat { text-align: center; }

    .hero-stat .val {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--accent2);
      font-family: 'Courier New', monospace;
    }

    .hero-stat .lbl {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* ── Toolbar ── */
    .toolbar {
      max-width: 1100px;
      margin: 28px auto 0;
      padding: 0 20px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-wrap {
      flex: 1;
      min-width: 200px;
      display: flex;
      align-items: center;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .search-wrap:focus-within { border-color: var(--accent); }

    .search-wrap span {
      padding: 0 12px;
      color: var(--muted);
      font-size: 1rem;
    }

    .search-wrap input {
      flex: 1;
      padding: 11px 12px 11px 0;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 0.88rem;
      outline: none;
    }

    .search-wrap input::placeholder { color: #334155; }

    .filter-group { display: flex; gap: 6px; flex-wrap: wrap; }

    .filter-btn {
      padding: 8px 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: transparent;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--accent2); }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── Count ── */
    .count-bar {
      max-width: 1100px;
      margin: 16px auto 0;
      padding: 0 20px;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .count-bar strong { color: var(--accent2); }

    /* ── Grid ── */
    .grid {
      max-width: 1100px;
      margin: 16px auto 52px;
      padding: 0 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--card-color, var(--accent));
      opacity: 0;
      transition: opacity 0.2s;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: var(--card-color, var(--accent));
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .card:hover::before { opacity: 1; }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .card-icon {
      font-size: 2rem;
      line-height: 1;
      flex-shrink: 0;
    }

    .card-tier {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .tier-1 { background: rgba(34,197,94,0.12); color: #22c55e; border: 1px solid rgba(34,197,94,0.25); }
    .tier-2 { background: rgba(245,158,11,0.12); color: #f59e0b; border: 1px solid rgba(245,158,11,0.25); }
    .tier-3 { background: rgba(239,68,68,0.12);  color: #ef4444; border: 1px solid rgba(239,68,68,0.25); }

    .card-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }

    .card-desc {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.6;
      flex: 1;
    }

    .card-tags {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 0.65rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 5px;
      background: rgba(99,102,241,0.1);
      color: var(--accent2);
      border: 1px solid rgba(99,102,241,0.2);
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 10px;
      border-top: 1px solid #1e293b;
    }

    .card-link {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--accent2);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .card-gh {
      font-size: 0.72rem;
      color: #334155;
      text-decoration: none;
      transition: color 0.15s;
    }

    .card-gh:hover { color: var(--muted); }

    /* ── Empty state ── */
    .empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 24px;
      font-size: 0.75rem;
      color: #334155;
      border-top: 1px solid var(--border);
    }

    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--text); }
  </style>
</head>

    /* ── State ── */
    let activeFilter = 'all';

    /* ── Build grid ── */
    function buildGrid(list) {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      if (list.length === 0) {
        grid.innerHTML = '<div class="empty">No projects match your search.</div>';
        document.getElementById('showCount').textContent = '0';
        return;
      }

      document.getElementById('showCount').textContent = list.length;

      list.forEach(p => {
        const card = document.createElement('a');
        card.className   = 'card';
        card.href        = p.repo;
        card.target      = '_blank';
        card.rel         = 'noopener noreferrer';
        card.style.setProperty('--card-color', p.color);

        const tierLabel = p.tier === 1 ? 'Beginner' : p.tier === 2 ? 'Intermediate' : 'Advanced';

        card.innerHTML = `
          <div class="card-top">
            <div class="card-icon">${p.icon}</div>
            <span class="card-tier tier-${p.tier}">${tierLabel}</span>
          </div>
          <div class="card-title">${p.name}</div>
          <div class="card-desc">${p.desc}</div>
          <div class="card-tags">
            <span class="tag">HTML</span>
            <span class="tag">CSS</span>
            <span class="tag">JS</span>
            ${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}
          </div>
          <div class="card-footer">
            <span class="card-link">View on GitHub →</span>
            <span class="card-gh">Open App ↗</span>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    /* ── Filter ── */
    function setFilter(tier, btn) {
      activeFilter = tier;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filterCards();
    }

    function filterCards() {
      const q = document.getElementById('searchInput').value.toLowerCase().trim();
      const filtered = PROJECTS.filter(p => {
        const matchTier   = activeFilter === 'all' || String(p.tier) === activeFilter;
        const matchSearch = !q ||
          p.name.toLowerCase().includes(q) ||
          p.desc.toLowerCase().includes(q) ||
          p.tags.some(t => t.toLowerCase().includes(q));
        return matchTier && matchSearch;
      });
      buildGrid(filtered);
    }

    /* ── Init ── */
    document.getElementById('totalCount').textContent = PROJECTS.length;
    document.getElementById('showCount').textContent  = PROJECTS.length;
    buildGrid(PROJECTS);
  </script>
</body>
</html>
