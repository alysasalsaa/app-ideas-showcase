<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>alysasalsaa — Project Showcase</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep:      #020208;
      --bg-base:      #06070f;
      --bg-elevated:  #0d0f1e;
      --surface:      rgba(255,255,255,0.035);
      --surface-hover:rgba(255,255,255,0.065);
      --border:       rgba(255,255,255,0.07);
      --border-hover: rgba(139,92,246,0.5);
      --text:         #eeeef0;
      --text-muted:   #6b7280;
      --text-dim:     #374151;

      --violet:       #8b5cf6;
      --violet-light: #a78bfa;
      --violet-glow:  rgba(139,92,246,0.18);
      --violet-glow2: rgba(139,92,246,0.06);
      --indigo:       #6366f1;
      --cyan:         #22d3ee;
      --emerald:      #34d399;
      --amber:        #fbbf24;
      --rose:         #fb7185;

      --radius-card:  20px;
      --radius-sm:    10px;
      --ease-out:     cubic-bezier(0.16, 1, 0.3, 1);
      --ease-spring:  cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg-deep);
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Ambient Background ─── */
    .ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.12;
      animation: drift 20s ease-in-out infinite alternate;
    }

    .blob-1 {
      width: 700px; height: 700px;
      background: radial-gradient(circle, #6366f1, transparent 70%);
      top: -200px; left: -150px;
      animation-duration: 25s;
    }

    .blob-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #8b5cf6, transparent 70%);
      top: 30%; right: -100px;
      animation-duration: 18s;
      animation-delay: -8s;
    }

    .blob-3 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #22d3ee, transparent 70%);
      bottom: 10%; left: 20%;
      animation-duration: 22s;
      animation-delay: -14s;
      opacity: 0.06;
    }

    @keyframes drift {
      0%   { transform: translate(0, 0) scale(1); }
      33%  { transform: translate(40px, -30px) scale(1.05); }
      66%  { transform: translate(-20px, 50px) scale(0.97); }
      100% { transform: translate(30px, 20px) scale(1.03); }
    }

    /* ─── Noise overlay ─── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    /* ─── Content wrapper ─── */
    .page { position: relative; z-index: 2; }

    /* ─── Hero ─── */
    .hero {
      padding: 88px 24px 72px;
      text-align: center;
      position: relative;
    }

    .hero::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(139,92,246,0.3), transparent);
    }



    .hero h1 {
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 900;
      line-height: 1.0;
      letter-spacing: -2px;
      margin-bottom: 16px;
    }

    .h1-top {
      color: #ffffff;
    }

    .h1-bot {
      background: linear-gradient(135deg, var(--violet-light) 0%, var(--cyan) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: 1.05rem;
      color: var(--violet-light);
      font-weight: 500;
      letter-spacing: 0.03em;
      margin: 0 auto;
    }



    /* ─── Toolbar ─── */
    .toolbar {
      max-width: 1100px;
      margin: 40px auto 0;
      padding: 0 24px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-wrap {
      flex: 1;
      min-width: 220px;
      display: flex;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s;
      backdrop-filter: blur(8px);
    }

    .search-wrap:focus-within {
      border-color: rgba(139,92,246,0.4);
      box-shadow: 0 0 0 3px rgba(139,92,246,0.08);
    }

    .search-icon {
      padding: 0 12px;
      color: var(--text-muted);
      font-size: 0.85rem;
      display: flex;
      align-items: center;
    }

    .search-wrap input {
      flex: 1;
      padding: 12px 12px 12px 0;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 0.85rem;
      outline: none;
      font-family: 'Inter', sans-serif;
    }

    .search-wrap input::placeholder { color: var(--text-dim); }

    .filter-group { display: flex; gap: 6px; flex-wrap: wrap; }

    .filter-btn {
      padding: 10px 18px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text-muted);
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s var(--ease-out);
      white-space: nowrap;
      backdrop-filter: blur(8px);
      font-family: 'Inter', sans-serif;
    }

    .filter-btn:hover {
      border-color: rgba(139,92,246,0.4);
      color: var(--violet-light);
      background: var(--violet-glow2);
    }

    .filter-btn.active {
      background: var(--violet-glow);
      border-color: rgba(139,92,246,0.45);
      color: var(--violet-light);
    }

    /* ─── Count bar ─── */
    .count-bar {
      max-width: 1100px;
      margin: 16px auto 0;
      padding: 0 24px;
      font-size: 0.75rem;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .count-bar strong { color: var(--violet-light); }

    /* ─── Grid ─── */
    .grid {
      max-width: 1100px;
      margin: 20px auto 72px;
      padding: 0 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px;
    }

    /* ─── Card ─── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: transform 0.28s var(--ease-out),
                  border-color 0.28s,
                  box-shadow 0.28s,
                  background 0.28s;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(12px);
    }

    /* Top accent line */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--card-color, var(--violet)), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    /* Glow on hover */
    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--radius-card);
      background: radial-gradient(circle at 50% 0%, var(--card-glow, rgba(139,92,246,0.06)), transparent 65%);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: rgba(139,92,246,0.28);
      background: var(--surface-hover);
      box-shadow:
        0 0 0 1px rgba(139,92,246,0.12),
        0 12px 40px rgba(0,0,0,0.5),
        0 4px 16px rgba(0,0,0,0.3);
    }

    .card:hover::before { opacity: 1; }
    .card:hover::after  { opacity: 1; }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .card-icon-wrap {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.25s var(--ease-spring);
      color: var(--card-color, var(--violet-light));
    }

    .card-icon-wrap svg {
      width: 20px; height: 20px;
      flex-shrink: 0;
    }

    .card:hover .card-icon-wrap {
      transform: scale(1.08) rotate(-3deg);
    }

    .card-tier {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 999px;
      white-space: nowrap;
      font-family: 'JetBrains Mono', monospace;
    }

    .tier-1 {
      background: rgba(52,211,153,0.08);
      color: var(--emerald);
      border: 1px solid rgba(52,211,153,0.2);
    }
    .tier-2 {
      background: rgba(251,191,36,0.08);
      color: var(--amber);
      border: 1px solid rgba(251,191,36,0.2);
    }
    .tier-3 {
      background: rgba(251,113,133,0.08);
      color: var(--rose);
      border: 1px solid rgba(251,113,133,0.2);
    }

    .card-title {
      font-size: 0.98rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.25;
      letter-spacing: -0.2px;
    }

    .card-desc {
      font-size: 0.79rem;
      color: var(--text-muted);
      line-height: 1.65;
      flex: 1;
      font-weight: 400;
    }

    .card-tags {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 0.62rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 6px;
      background: rgba(139,92,246,0.08);
      color: #7c85ff;
      border: 1px solid rgba(139,92,246,0.15);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.02em;
      transition: background 0.15s, color 0.15s;
    }

    .card:hover .tag {
      background: rgba(139,92,246,0.12);
      color: var(--violet-light);
    }



    /* ─── Empty state ─── */
    .empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
      font-size: 0.88rem;
    }

    .empty-icon { width: 40px; height: 40px; margin: 0 auto 12px; display: block; opacity: 0.35; color: var(--text-muted); }



    /* ─── Scroll animations ─── */
    .card {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.5s var(--ease-out) forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ─── Responsive ─── */
    @media (max-width: 600px) {
      .hero { padding: 64px 16px 52px; }
      .hero-stats { max-width: 100%; }
      .toolbar { padding: 0 16px; }
      .grid { padding: 0 16px; gap: 12px; }
    }

    /* ─── Focus styles ─── */
    :focus-visible {
      outline: 2px solid rgba(139,92,246,0.6);
      outline-offset: 3px;
    }

    /* ─── Reduced motion ─── */
    @media (prefers-reduced-motion: reduce) {
      .blob, .card, .eyebrow-dot { animation: none; }
      .card { opacity: 1; transform: none; }
    }
  </style>
</head>
<body>

  <!-- Ambient blobs -->
  <div class="ambient" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="page">

    <!-- Hero -->
    <header class="hero">
      <h1><span class="h1-top">PROJECT </span><span class="h1-bot">SHOWCASE</span></h1>
      <p class="hero-sub">Alysa Salsabila Irfan Putri</p>
    </header>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.5"/><path d="M11 11L14.5 14.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </span>
        <input type="text" id="searchInput" placeholder="Search projects…" oninput="filterCards()" autocomplete="off" />
      </div>
      <div class="filter-group">
        <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
        <button class="filter-btn" onclick="setFilter('1', this)">Beginner</button>
        <button class="filter-btn" onclick="setFilter('2', this)">Intermediate</button>
      </div>
    </div>

    <!-- Count -->
    <div class="count-bar">
      <strong id="showCount">38</strong> projects found
    </div>

    <!-- Grid -->
    <main class="grid" id="grid" aria-label="Project list"></main>



  </div><!-- .page -->

    let activeFilter = 'all';

    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1,3),16);
      const g = parseInt(hex.slice(3,5),16);
      const b = parseInt(hex.slice(5,7),16);
      return `${r},${g},${b}`;
    }

    function buildGrid(list) {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      document.getElementById('showCount').textContent = list.length;

      if (list.length === 0) {
        grid.innerHTML = `
          <div class="empty">
            <svg class="empty-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            No projects match your search.
          </div>`;
        return;
      }

      list.forEach((p, i) => {
        const card = document.createElement('a');
        card.className = 'card';
        card.href = p.repo;
        card.target = '_blank';
        card.rel = 'noopener noreferrer';
        card.style.setProperty('--card-color', p.color);
        card.style.setProperty('--card-glow', `rgba(${hexToRgb(p.color)},0.07)`);
        card.style.animationDelay = `${Math.min(i * 35, 500)}ms`;

        const tierLabel = p.tier === 1 ? 'Beginner' : p.tier === 2 ? 'Intermediate' : 'Advanced';

        card.innerHTML = `
          <div class="card-top">
            <div class="card-icon-wrap">${p.icon}</div>
            <span class="card-tier tier-${p.tier}">${tierLabel}</span>
          </div>
          <div class="card-title">${p.name}</div>
          <div class="card-desc">${p.desc}</div>
          <div class="card-tags">
            <span class="tag">HTML</span>
            <span class="tag">CSS</span>
            <span class="tag">JS</span>
            ${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}
          </div>

        `;
        grid.appendChild(card);
      });
    }

    function setFilter(tier, btn) {
      activeFilter = tier;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filterCards();
    }

    function filterCards() {
      const q = document.getElementById('searchInput').value.toLowerCase().trim();
      const filtered = PROJECTS.filter(p => {
        const matchTier   = activeFilter === 'all' || String(p.tier) === activeFilter;
        const matchSearch = !q ||
          p.name.toLowerCase().includes(q) ||
          p.desc.toLowerCase().includes(q) ||
          p.tags.some(t => t.toLowerCase().includes(q));
        return matchTier && matchSearch;
      });
      buildGrid(filtered);
    }

    document.getElementById('showCount').textContent  = PROJECTS.length;
    buildGrid(PROJECTS);
  </script>
